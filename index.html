<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkamiPorto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Profile Section - PERSIS ZENKAI -->
    <section class="profile-section">
        <div class="profile-container">
            <div class="profile-circle">
                <img src="profile.jpg" alt="OKAMI" class="profile-img">
            </div>
            <h1 class="profile-name">OKAMI</h1>
            <p class="profile-bio">Video Editor | Content Creator</p>
        </div>
    </section>

    <!-- Social Links - PERSIS ZENKAI -->
    <section class="social-section">
        <div class="social-container">
            <a href="https://tiktok.com/@username" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://youtube.com/@username" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://instagram.com/username" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </section>

    <!-- Filter Section - PERSIS ZENKAI -->
    <section class="filter-section">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="script-shorts">Script Shorts</button>
            <button class="filter-btn" data-filter="gameplay">Gameplay</button>
            <button class="filter-btn" data-filter="other">Other</button>
        </div>
    </section>

    <!-- Portfolio Grid -->
    <section class="portfolio-section">
        <div class="portfolio-grid" id="portfolioGrid">
            <!-- Script Shorts -->
            <div class="portfolio-item script-shorts">
                <img src="portfolio/1.jpg" alt="Script Shorts 1">
                <div class="overlay">
                    <a href="portfolio/1.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item script-shorts">
                <img src="portfolio/2.jpg" alt="Script Shorts 2">
                <div class="overlay">
                    <a href="portfolio/2.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
