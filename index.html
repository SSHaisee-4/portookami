<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkamiPorto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="profile">
                <img src="profile.jpg" alt="Foto Profil OKAMI" class="profile-img" id="profileImg">
                <h1 class="name" id="nama">OKAMI</h1>
                <p class="tagline" id="tagline">Video Editor | Content Creator</p>
            </div>
        </header>

        <!-- Social Links -->
        <div class="social-links">
            <a href="https://tiktok.com/@username" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.youtube.com/@Mozie_Cihuyy" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://instagram.com/username" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <!-- Portfolio Grid -->
        <div class="portfolio-grid">
            <div class="portfolio-item">
                <img src="portfolio/1.jpg" alt="Portfolio 1">
                <div class="overlay">
                    <a href="portfolio/1.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="portfolio/2.jpg" alt="Portfolio 2">
                <div class="overlay">
                    <a href="portfolio/2.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="portfolio/3.jpg" alt="Portfolio 3">
                <div class="overlay">
                    <a href="portfolio/3.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="portfolio/4.jpg" alt="Portfolio 4">
                <div class="overlay">
                    <a href="portfolio/4.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="portfolio/5.jpg" alt="Portfolio 5">
                <div class="overlay">
                    <a href="portfolio/5.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="portfolio/6.jpg" alt="Portfolio 6">
                <div class="overlay">
                    <a href="portfolio/6.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
