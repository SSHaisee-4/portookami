<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkamiPorto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="profile">
                <img src="profile.jpg" alt="Foto Profil OKAMI" class="profile-img" id="profileImg">
                <h1 class="name" id="nama">OKAMI</h1>
                <p class="tagline" id="tagline">Video Editor | Content Creator</p>
            </div>
        </header>

        <div class="social-links">
            <a href="https://tiktok.com/@username" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.youtube.com/@Mozie_Cihuyy" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://instagram.com/username" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-th-large"></i> All
            </button>
            <button class="filter-btn" data-filter="script-shorts">
                <i class="fas fa-code"></i> Script Shorts
            </button>
            <button class="filter-btn" data-filter="gameplay">
                <i class="fas fa-gamepad"></i> Gameplay
            </button>
            <button class="filter-btn" data-filter="other">
                <i class="fas fa-star"></i> Other
            </button>
        </div>

        <div class="portfolio-grid" id="portfolioGrid">
            <!-- 🔥 SCRIPT SHORTS 1 - TIKTOK ✅ -->
            <div class="portfolio-item script-shorts tiktok-video">
                <img src="https://i.imgur.com/htEDbOI.png" alt="Script Shorts 1" style="object-fit: cover;">
                <div class="overlay">
                    <a href="https://www.tiktok.com/@siapngegame/video/7633781157229874453" class="view-btn" target="_blank">
                        <i class="fab fa-tiktok"></i> Tonton TikTok
                    </a>
                </div>
            </div>
            
            <!-- 🔥 SCRIPT SHORTS 2 - YOUTUBE SHORTS ✅ -->
            <div class="portfolio-item script-shorts youtube-shorts">
                <img src="https://i.ytimg.com/vi/QFC6Dys6ZSA/hqdefault.jpg" alt="Script Shorts 2" style="object-fit: cover;">
                <div class="overlay">
                    <a href="https://youtube.com/shorts/QFC6Dys6ZSA?si=3Mryc7ry1Lot_GQk" class="view-btn" target="_blank">
                        <i class="fab fa-youtube"></i> Tonton Shorts
                    </a>
                </div>
            </div>

            <!-- 🔥 SCRIPT SHORTS 3 - YOUTUBE SHORTS BARU ✅ -->
            <div class="portfolio-item script-shorts youtube-shorts">
                <img src="https://i.ytimg.com/vi/1oAzH-SmwkQ/hqdefault.jpg" alt="Script Shorts 3" style="object-fit: cover;">
                <div class="overlay">
                    <a href="https://youtube.com/shorts/1oAzH-SmwkQ?si=49MxdJmuqOdc-QnF" class="view-btn" target="_blank">
                        <i class="fab fa-youtube"></i> Tonton Shorts
                    </a>
                </div>
            </div>

            <!-- Gameplay 1 - YouTube -->
            <div class="portfolio-item gameplay youtube-video">
                <img src="https://img.youtube.com/vi/8b_6u11nJSU/maxresdefault.jpg" alt="Gameplay 1">
                <div class="overlay">
                    <a href="https://youtu.be/8b_6u11nJSU?si=fbyl_GG6HD8iD7HR" class="view-btn" target="_blank">
                        <i class="fab fa-play"></i> Tonton Video
                    </a>
                </div>
            </div>

            <!-- 🔥 GAMEPLAY 2 - TIKTOK ✅ -->
            <div class="portfolio-item gameplay tiktok-video">
                <img src="https://i.imgur.com/IpA4Zht.png" alt="Gameplay 2" style="object-fit: cover;">
                <div class="overlay">
                    <a href="https://www.tiktok.com/@whosshand/video/7632532273182674194" class="view-btn" target="_blank">
                        <i class="fab fa-tiktok"></i> Tonton TikTok
                    </a>
                </div>
            </div>

            <!-- Other 1 -->
            <div class="portfolio-item other">
                <img src="portfolio/5.jpg" alt="Other 1">
                <div class="overlay">
                    <a href="portfolio/5.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            
            <!-- Other 2 -->
            <div class="portfolio-item other">
                <img src="portfolio/6.jpg" alt="Other 2">
                <div class="overlay">
                    <a href="portfolio/6.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
