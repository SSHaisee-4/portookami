<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkamiPorto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="profile">
                <img src="profile.jpg" alt="Foto Profil OKAMI" class="profile-img" id="profileImg">
                <h1 class="name" id="nama">OKAMI</h1>
                <p class="tagline" id="tagline">Video Editor | Content Creator</p>
            </div>
        </header>

        <!-- Social Links -->
        <div class="social-links">
            <a href="https://tiktok.com/@username" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://youtube.com/@username" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://instagram.com/username" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-th-large"></i> All
            </button>
            <button class="filter-btn" data-filter="script-shorts">
                <i class="fas fa-code"></i> Script Shorts
            </button>
            <button class="filter-btn" data-filter="gameplay">
                <i class="fas fa-gamepad"></i> Gameplay
            </button>
            <button class="filter-btn" data-filter="other">
                <i class="fas fa-star"></i> Other
            </button>
        </div>

        <!-- Portfolio Grid -->
        <div class="portfolio-grid" id="portfolioGrid">
            <!-- Script Shorts - YouTube -->
            <div class="portfolio-item script-shorts" data-type="youtube" data-video="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
                <img src="portfolio/1.jpg" alt="Script Shorts 1">
                <div class="platform-badge youtube-badge">YouTube</div>
                <div class="overlay">
                    <div class="video-actions">
                        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="view-btn platform-btn youtube-btn" target="_blank">
                            <i class="fab fa-youtube"></i> Watch
                        </a>
                        <button class="copy-btn" onclick="copyVideoLink('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Script Shorts - TikTok -->
            <div class="portfolio-item script-shorts" data-type="tiktok" data-video="https://www.tiktok.com/@username/video/123456789">
                <img src="portfolio/2.jpg" alt="Script Shorts 2">
                <div class="platform-badge tiktok-badge">TikTok</div>
                <div class="overlay">
                    <div class="video-actions">
                        <a href="https://www.tiktok.com/@username/video/123456789" class="view-btn platform-btn tiktok-btn" target="_blank">
                            <i class="fab fa-tiktok"></i> Watch
                        </a>
                        <button class="copy-btn" onclick="copyVideoLink('https://www.tiktok.com/@username/video/123456789')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Gameplay - YouTube -->
            <div class="portfolio-item gameplay" data-type="youtube" data-video="https://www.youtube.com/watch?v=abc123">
                <img src="portfolio/3.jpg" alt="Gameplay 1">
                <div class="platform-badge youtube-badge">YouTube</div>
                <div class="overlay">
                    <div class="video-actions">
                        <a href="https://www.youtube.com/watch?v=abc123" class="view-btn platform-btn youtube-btn" target="_blank">
                            <i class="fab fa-youtube"></i> Watch
                        </a>
                        <button class="copy-btn" onclick="copyVideoLink('https://www.youtube.com/watch?v=abc123')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Gameplay - TikTok -->
            <div class="portfolio-item gameplay" data-type="tiktok" data-video="https://www.tiktok.com/@username/video/456789">
                <img src="portfolio/4.jpg" alt="Gameplay 2">
                <div class="platform-badge tiktok-badge">TikTok</div>
                <div class="overlay">
                    <div class="video-actions">
                        <a href="https://www.tiktok.com/@username/video/456789" class="view-btn platform-btn tiktok-btn" target="_blank">
                            <i class="fab fa-tiktok"></i> Watch
                        </a>
                        <button class="copy-btn" onclick="copyVideoLink('https://www.tiktok.com/@username/video/456789')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Other - YouTube -->
            <div class="portfolio-item other" data-type="youtube" data-video="https://www.youtube.com/watch?v=xyz789">
                <img src="portfolio/5.jpg" alt="Other 1">
                <div class="platform-badge youtube-badge">YouTube</div>
                <div class="overlay">
                    <div class="video-actions">
                        <a href="https://www.youtube.com/watch?v=xyz789" class="view-btn platform-btn youtube-btn" target="_blank">
                            <i class="fab fa-youtube"></i> Watch
                        </a>
                        <button class="copy-btn" onclick="copyVideoLink('https://www.youtube.com/watch?v=xyz789')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Other - TikTok -->
            <div class="portfolio-item other" data-type="tiktok" data-video="https://www.tiktok.com/@username/video/987654">
                <img src="portfolio/6.jpg" alt="Other 2">
                <div class="platform-badge tiktok-badge">TikTok</div>
                <div class="overlay">
                    <div class="video-actions">
                        <a href="https://www.tiktok.com/@username/video/987654" class="view-btn platform-btn tiktok-btn" target="_blank">
                            <i class="fab fa-tiktok"></i> Watch
                        </a>
                        <button class="copy-btn" onclick="copyVideoLink('https://www.tiktok.com/@username/video/987654')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
