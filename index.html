<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkamiPorto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Section - Persis Zenkaiedits -->
    <header class="header-section">
        <div class="header-content">
            <h1 class="main-name">OKAMI</h1>
            <div class="social-container">
                <a href="https://tiktok.com/@username" target="_blank" class="social-link tiktok">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://youtube.com/@username" target="_blank" class="social-link youtube">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="https://instagram.com/username" target="_blank" class="social-link instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- Filter Section - Persis Zenkaiedits -->
    <div class="filter-wrapper">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="script-shorts">Script Shorts</button>
            <button class="filter-btn" data-filter="gameplay">Gameplay</button>
            <button class="filter-btn" data-filter="other">Other</button>
        </div>
    </div>

    <!-- Portfolio Grid -->
    <div class="portfolio-grid" id="portfolioGrid">
        <!-- Script Shorts -->
        <div class="portfolio-item script-shorts">
            <img src="portfolio/1.jpg" alt="Script Shorts 1">
            <div class="overlay">
                <a href="portfolio/1.jpg" class="view-btn" target="_blank">Lihat</a>
            </div>
        </div>
        <div class="portfolio-item script-shorts">
            <img src="portfolio/2.jpg" alt="Script Shorts 2">
            <div class="overlay">
                <a href="portfolio/2.jpg" class="view-btn" target="_blank">Lihat</a>
            </div>
        </div>

        <!-- Gameplay -->
        <div class="portfolio-item gameplay">
            <img src="portfolio/3.jpg" alt="Gameplay 1">
            <div class="overlay">
                <a href="portfolio/3.jpg" class="view-btn" target="_blank">Lihat</a>
            </div>
        </div>
        <div class="portfolio-item gameplay">
            <img src="portfolio/4.jpg" alt="Gameplay 2">
            <div class="overlay">
                <a href="portfolio/4.jpg" class="view-btn" target="_blank">Lihat</a>
            </div>
        </div>

        <!-- Other -->
        <div class="portfolio-item other">
            <img src="portfolio/5.jpg" alt="Other 1">
            <div class="overlay">
                <a href="portfolio/5.jpg" class="view-btn" target="_blank">Lihat</a>
            </div>
        </div>
        <div class="portfolio-item other">
            <img src="portfolio/6.jpg" alt="Other 2">
            <div class="overlay">
                <a href="portfolio/6.jpg" class="view-btn" target="_blank">Lihat</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
