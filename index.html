<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkamiPorto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="profile">
                <img src="profile.jpg" alt="Foto Profil OKAMI" class="profile-img" id="profileImg">
                <h1 class="name" id="nama">OKAMI</h1>
                <p class="tagline" id="tagline">Video Editor | Content Creator</p>
            </div>
        </header>

        <!-- Social Links -->
        <div class="social-links">
            <a href="https://tiktok.com/@username" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.youtube.com/@Mozie_Cihuyy" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://instagram.com/username" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-th-large"></i> All
            </button>
            <button class="filter-btn" data-filter="script-shorts">
                <i class="fas fa-code"></i> Script Shorts
            </button>
            <button class="filter-btn" data-filter="gameplay">
                <i class="fas fa-gamepad"></i> Gameplay
            </button>
            <button class="filter-btn" data-filter="other">
                <i class="fas fa-star"></i> Other
            </button>
        </div>

        <!-- Portfolio Grid -->
        <div class="portfolio-grid" id="portfolioGrid">
            <!-- Script Shorts 1 - TIKTOK VIDEO ✅ -->
            <div class="portfolio-item script-shorts tiktok-video">
                <img src="https://img.youtube.com/vi/8b_6u11nJSU/maxresdefault.jpg" alt="Script Shorts 1" style="object-fit: cover;">
                <div class="overlay">
                    <a href="https://www.tiktok.com/@siapngegame/video/7633781157229874453?is_from_webapp=1&sender_device=pc&web_id=7576312268553717249" class="view-btn" target="_blank">
                        <i class="fab fa-tiktok"></i> Tonton TikTok
                    </a>
                </div>
            </div>
            
            <!-- Script Shorts 2 -->
            <div class="portfolio-item script-shorts">
                <img src="portfolio/2.jpg" alt="Script Shorts 2">
                <div class="overlay">
                    <a href="portfolio/2.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>

            <!-- Gameplay 1 - THUMBNAIL YOUTUBE -->
            <div class="portfolio-item gameplay youtube-video">
                <img src="https://img.youtube.com/vi/8b_6u11nJSU/maxresdefault.jpg" alt="Gameplay 1">
                <div class="overlay">
                    <a href="https://youtu.be/8b_6u11nJSU?si=fbyl_GG6HD8iD7HR" class="view-btn" target="_blank">
                        <i class="fab fa-play"></i> Tonton Video
                    </a>
                </div>
            </div>

            <!-- Gameplay 2 -->
            <div class="portfolio-item gameplay">
                <img src="portfolio/4.jpg" alt="Gameplay 2">
                <div class="overlay">
                    <a href="portfolio/4.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>

            <!-- Other -->
            <div class="portfolio-item other">
                <img src="portfolio/5.jpg" alt="Other 1">
                <div class="overlay">
                    <a href="portfolio/5.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
            <div class="portfolio-item other">
                <img src="portfolio/6.jpg" alt="Other 2">
                <div class="overlay">
                    <a href="portfolio/6.jpg" class="view-btn" target="_blank">Lihat</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
